name: Autonomous Agent Loop

on:
  workflow_dispatch:
    inputs:
      goal:
        description: 'Goal for the Agent Loop'
        required: false
        default: 'Create a comprehensive Python script that fetches weather data for Rabat.'

jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install openai

      - name: Run Agent Loop
        env:
          ZAI_API_URL: ${{ secrets.ZAI_API_URL }}
        run: |
          if [ -z "$ZAI_API_URL" ]; then
            echo "Error: ZAI_API_URL secret is missing! Set it to your Kaggle Ngrok URL."
            exit 1
          fi
          cd agent-loop-lab
          python agent_loop.py

      - name: Upload Generated Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-artifact
          path: agent-loop-lab/final_code.py
